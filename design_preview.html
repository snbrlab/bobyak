<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>bobyak 디자인 미리보기 🍚</title>
<link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&family=Dongle:wght@400;700&display=swap"
      media="print" onload="this.media='all'" />
<style>
  :root{
    --ink:#5a4a42; --soft:#a99a92; --line:#f0e3da; --accent:#ff8fab;
    --head:"Dongle",system-ui,sans-serif; --body:"Gowun Dodum",system-ui,sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:var(--body);color:var(--ink);
    background:radial-gradient(circle at 20% 0%,#fff0e8,#fff6f0 60%);padding:20px 14px 60px;}
  .wrap{max-width:460px;margin:0 auto;}
  h1{font-family:var(--head);font-weight:700;font-size:2.6rem;text-align:center;margin:6px 0 2px;}
  .lead{text-align:center;color:var(--soft);margin:0 0 24px;}
  .concept{background:#fff;border-radius:22px;box-shadow:0 8px 24px rgba(214,165,140,.18);
    padding:16px 14px;margin-bottom:22px;}
  .concept > h2{font-family:var(--head);font-weight:700;font-size:1.7rem;margin:0 0 2px;}
  .concept > .desc{color:var(--soft);font-size:.9rem;margin:0 0 14px;}
  .wdhead{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:6px;}
  .wdhead span{text-align:center;font-weight:700;color:var(--soft);font-size:.9rem;}
  .legend{margin-top:10px;font-size:.82rem;color:var(--soft);text-align:center;}

  /* ============ A. 근무표 그리드 ============ */
  table.grid{width:100%;border-collapse:separate;border-spacing:5px;}
  table.grid th, table.grid td{text-align:center;}
  table.grid thead th{font-family:var(--head);font-weight:700;font-size:1.15rem;color:var(--ink);padding-bottom:2px;}
  table.grid thead th.today{color:var(--accent);}
  table.grid .who{text-align:left;white-space:nowrap;font-weight:700;font-size:.92rem;padding-right:4px;}
  table.grid .who .dot{display:inline-block;width:11px;height:11px;border-radius:50%;margin-right:5px;vertical-align:middle;}
  .gmark{display:inline-block;width:26px;height:26px;border-radius:9px;background:#f3ece6;}
  .gmark.full{background:var(--c);}
  .gmark.am{background:linear-gradient(90deg,#f0e6df 50%,var(--c) 50%);}
  .gmark.pm{background:linear-gradient(90deg,var(--c) 50%,#f0e6df 50%);}
  .gmark.none{background:transparent;position:relative;}
  .gmark.none::after{content:"";position:absolute;inset:0;margin:auto;width:5px;height:5px;border-radius:50%;background:#e6dbd2;}
  table.grid td.allcol{background:linear-gradient(120deg,#ffd0e4,#ffe7b8,#cdf6e0);border-radius:9px;}

  /* ============ 공통 데이카드 (B/C/D/E) ============ */
  .week{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
  .dcard{background:#fdf7f3;border-radius:14px;padding:6px 4px;min-height:96px;
    display:flex;flex-direction:column;align-items:center;border:2px solid transparent;}
  .dcard .dnum{font-size:.9rem;font-weight:700;}
  .dcard.today{border-color:var(--accent);background:#fff;}
  .dcard.today .dnum{color:var(--accent);}
  .dcard.allin{background:linear-gradient(120deg,#ffd0e4,#ffe7b8,#cdf6e0,#c9e7ff,#ffd0e4);
    background-size:320% 320%;animation:flow 3s ease infinite;}
  @keyframes flow{0%{background-position:0 50%}50%{background-position:100% 50%}100%{background-position:0 50%}}

  /* B. 게이지 */
  .b-num{font-family:var(--head);font-weight:700;font-size:1.9rem;line-height:1;margin-top:4px;}
  .b-num small{font-size:1rem;color:var(--soft);}
  .b-bar{width:80%;height:7px;border-radius:5px;background:#eee3db;overflow:hidden;margin:5px 0 3px;}
  .b-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,#ffb86b,#ff7a9d);}
  .b-fire{font-size:.7rem;letter-spacing:-2px;}
  .b-names{margin-top:4px;display:flex;flex-wrap:wrap;gap:2px;justify-content:center;}
  .b-ini{width:15px;height:15px;border-radius:50%;font-size:.55rem;color:#fff;
    display:flex;align-items:center;justify-content:center;font-weight:700;}

  /* C. 식탁 */
  .c-bowls{font-size:1.05rem;line-height:1.15;margin-top:4px;text-align:center;word-break:break-all;}
  .c-cnt{font-size:.72rem;color:var(--soft);margin-top:2px;}
  .c-names{font-size:.6rem;color:var(--ink);margin-top:3px;text-align:center;line-height:1.3;}

  /* D. 이름칩 + 반차 아이콘 */
  .d-tags{display:flex;flex-direction:column;gap:3px;width:100%;margin-top:4px;}
  .d-pill{display:flex;align-items:center;justify-content:center;gap:2px;height:19px;border-radius:6px;
    font-size:.66rem;font-weight:700;color:#4a3f3a;}
  .d-pill .ic{font-size:.62rem;}

  /* E. 현재 방식 (반쪽칠 고정슬롯) */
  .e-tags{display:flex;flex-direction:column;gap:3px;width:100%;margin-top:4px;}
  .e-pill{height:19px;line-height:19px;border-radius:6px;font-size:.66rem;font-weight:700;color:#4a3f3a;text-align:center;}
  .e-pill.full{background:var(--c);}
  .e-pill.am{background:linear-gradient(90deg,color-mix(in srgb,var(--c) 20%,#fff) 50%,var(--c) 50%);}
  .e-pill.pm{background:linear-gradient(90deg,var(--c) 50%,color-mix(in srgb,var(--c) 20%,#fff) 50%);}
  .e-pill.empty{background:transparent;}
</style>
</head>
<body>
<div class="wrap">
  <h1>🍚 디자인 미리보기</h1>
  <p class="lead">같은 한 주(월~금)를 여러 방식으로 그려봤어요.<br/>수요일은 전원 출근(다모임), 다현은 오전반차 예시예요.</p>
  <div id="root"></div>
</div>

<script>
const members = [
  { name:"휘영", color:"#FF8FAB" },
  { name:"가은", color:"#6FD3C7" },
  { name:"다현", color:"#FFB570" },
  { name:"희진", color:"#9F8FFF" },
  { name:"인히", color:"#7FB8FF" },
];
// status: full(종일) | am(오전반차,오후나옴) | pm(오후반차,오전나옴) | 없음
const week = [
  { dow:"월", d:22, today:false, st:{ "휘영":"full","가은":"full","다현":"am","희진":"full" } },
  { dow:"화", d:23, today:false, st:{ "휘영":"full","희진":"full" } },
  { dow:"수", d:24, today:true,  st:{ "휘영":"full","가은":"full","다현":"am","희진":"full","인히":"pm" } },
  { dow:"목", d:25, today:false, st:{ "희진":"full" } },
  { dow:"금", d:26, today:false, st:{ "휘영":"full","가은":"full","희진":"pm" } },
];
const get = (day,name)=> day.st[name] || null;
const present = (day)=> members.filter(m=>get(day,m.name));
const allIn = (day)=> present(day).length === members.length;
const root = document.getElementById("root");

function concept(title, desc, innerHTML, legend){
  return `<section class="concept"><h2>${title}</h2><div class="desc">${desc}</div>${innerHTML}${legend?`<div class="legend">${legend}</div>`:""}</section>`;
}
function wdhead(){ return `<div class="wdhead">${week.map(w=>`<span class="${w.today?'today':''}">${w.dow}</span>`).join("")}</div>`; }

/* ===== A. 근무표 그리드 ===== */
function gridConcept(){
  let head = `<tr><th></th>${week.map(w=>`<th class="${w.today?'today':''}">${w.dow}<br>${w.d}</th>`).join("")}</tr>`;
  let rows = members.map(m=>{
    const cells = week.map(w=>{
      const s = get(w,m.name);
      const cls = s ? s : "none";
      const col = allIn(w) ? "allcol" : "";
      return `<td class="${col}"><span class="gmark ${cls}" style="--c:${m.color}"></span></td>`;
    }).join("");
    return `<tr><td class="who"><span class="dot" style="background:${m.color}"></span>${m.name}</td>${cells}</tr>`;
  }).join("");
  const inner = `<table class="grid"><thead>${head}</thead><tbody>${rows}</tbody></table>`;
  return concept("A. 근무표 그리드 ⭐", "행=사람, 열=요일. 이름은 왼쪽에 한 번만. 가로=내 일주일, 세로=그날 누구.",
    inner, "■ 종일  ◧ 반차(채운 쪽이 나오는 시간)  · 안나옴 &nbsp;|&nbsp; 무지개칸 = 다모임");
}

/* ===== B. 게이지 + 이글이글 ===== */
function gaugeConcept(){
  const cards = week.map(w=>{
    const ps = present(w); const n = ps.length;
    const fires = "🔥".repeat(n);
    const inis = ps.map(m=>`<span class="b-ini" style="background:${m.color}">${m.name[0]}</span>`).join("");
    return `<div class="dcard ${w.today?'today':''} ${allIn(w)?'allin':''}">
      <span class="dnum">${w.d}</span>
      <span class="b-num">${n}<small>/${members.length}</small></span>
      <div class="b-bar"><div class="b-fill" style="width:${n/members.length*100}%"></div></div>
      <div class="b-fire">${fires||"·"}</div>
      <div class="b-names">${inis}</div>
    </div>`;
  }).join("");
  return concept("B. 출근 게이지 + 이글이글", "하루칸에 'n/5' + 채움바 + 불꽃. 인원 많을수록 뜨겁게, 전원이면 이글이글.",
    wdhead()+`<div class="week">${cards}</div>`, "동그라미=이름 첫글자");
}

/* ===== C. 식탁 메타포 ===== */
function tableConcept(){
  const cards = week.map(w=>{
    const ps = present(w);
    const bowls = ps.map(m=> get(w,m.name)==="full" ? "🍚" : "🍙").join("");
    const names = ps.map(m=>m.name).join(" ");
    return `<div class="dcard ${w.today?'today':''} ${allIn(w)?'allin':''}">
      <span class="dnum">${w.d}</span>
      <div class="c-bowls">${bowls||"·"}</div>
      <div class="c-cnt">${ps.length}/${members.length}명</div>
      <div class="c-names">${names}</div>
    </div>`;
  }).join("");
  return concept("C. 식탁 메타포 🍚", "출근 = 밥그릇 한 개(반차는 🍙). 자리 채워지는 식탁 느낌.",
    wdhead()+`<div class="week">${cards}</div>`, "🍚 종일  🍙 반차");
}

/* ===== D. 이름칩 + 반차 아이콘 ===== */
function pillIconConcept(){
  const ICON = { am:"🌅", pm:"🌆" };
  const cards = week.map(w=>{
    const rows = members.map(m=>{
      const s = get(w,m.name);
      if(!s) return `<div class="d-pill" style="background:transparent">&nbsp;</div>`;
      return `<div class="d-pill" style="background:${m.color}">${m.name}${ICON[s]?`<span class="ic">${ICON[s]}</span>`:""}</div>`;
    }).join("");
    return `<div class="dcard ${w.today?'today':''} ${allIn(w)?'allin':''}">
      <span class="dnum">${w.d}</span><div class="d-tags">${rows}</div></div>`;
  }).join("");
  return concept("D. 이름칩 + 반차 아이콘", "지금처럼 이름칩, 단 반차는 반쪽칠 대신 아이콘으로 명확히(🌅오전/🌆오후).",
    wdhead()+`<div class="week">${cards}</div>`, "아이콘 없으면 종일");
}

/* ===== E. 현재 방식 (비교용) ===== */
function currentConcept(){
  const cards = week.map(w=>{
    const rows = members.map(m=>{
      const s = get(w,m.name);
      return s ? `<div class="e-pill ${s}" style="--c:${m.color}">${m.name}</div>`
               : `<div class="e-pill empty"></div>`;
    }).join("");
    return `<div class="dcard ${w.today?'today':''} ${allIn(w)?'allin':''}">
      <span class="dnum">${w.d}</span><div class="e-tags">${rows}</div></div>`;
  }).join("");
  return concept("E. 지금 방식 (비교용)", "고정 슬롯 + 반쪽칠. 왼/오 반쪽으로 반차 표현.",
    wdhead()+`<div class="week">${cards}</div>`, "왼쪽반=오후반차 · 오른쪽반=오전반차");
}

root.innerHTML = gridConcept() + gaugeConcept() + tableConcept() + pillIconConcept() + currentConcept();
</script>
</body>
</html>
